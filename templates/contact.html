<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Placement Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/contact.css') }}">
</head>
<body>

<header>
    <h1>Contact Us</h1>
    <p>We’d love to hear from you</p>
</header>

<div class="container">

    <!-- Contact Info -->
    <div class="card info">
        <h2>Get in Touch</h2>
        <p><strong>Email:</strong> support@placementtracker.com</p>
        <p><strong>Phone:</strong> +91 98765 43210</p>
        <p><strong>Location:</strong> Hyderabad, India</p>

        <p>If you have any questions about placements, tracking, or features, feel free to reach out!</p>
    </div>

    <!-- Contact Form -->
    <div class="card">
        <h2>Send Message</h2>

        <form action="/contact" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <input type="text" name="subject" placeholder="Subject">
            <textarea name="message" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

</div>

<footer>
    <p>© 2026 Placement Tracker App</p>
</footer>

</body>
</html>
