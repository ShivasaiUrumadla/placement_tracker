            <!-- <a href="#">Blogs</a> -->

        <a href="/login" class="btn-primary">Login</a>
    </nav>

    <!-- Hero Section -->
    <main class="hero-container" style="align-items: center; justify-content: center;">
        
        <!-- Registration Form on the Left -->
        <div class="hero-content" style="max-width: 450px;">
            <div class="badge">✨ Join Placement Tracker</div>
            <!-- <h1 class="hero-title" style="font-size: 48px;">Empower <span class="text-gradient">Learning</span><br>with AI.</h1> -->
            <p class="hero-subtitle" style="font-size: 16px; margin-bottom: 24px;">Create your account to start tracking your DSA, Assessments, and Mock Interviews.</p>
            
            <form class="auth-form" action="/register" method="POST" style="background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border);">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a strong password" required>
                </div>
                
                <button type="submit" class="btn-primary-large" style="width: 100%; margin-top: 8px;">Create Account</button>
                <div style="text-align: center; margin-top: 16px; font-size: 13px;">
                    Already have an account? <a href="/login" style=" font-weight: 600;">Login here</a>
                </div>
            </form>
        </div>
